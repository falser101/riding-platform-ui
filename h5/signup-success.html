<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>报名成功 - 骑行平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <div class="page-content">
            <!-- 成功提示 -->
            <div class="success-page">
                <div class="success-icon">✓</div>
                <div class="success-title">报名成功！</div>
                <div class="success-desc">我们已将报名详情发送至您的微信服务通知</div>
            </div>

            <!-- 凭证卡片 -->
            <div class="voucher-card">
                <div class="voucher-header">
                    <div class="voucher-title">2026 环青海湖国际骑行挑战赛</div>
                    <div class="voucher-status">已报名</div>
                </div>
                <div class="voucher-row">
                    <span class="label">报名编号</span>
                    <span style="font-weight:600;">RB20260715001</span>
                </div>
                <div class="voucher-row">
                    <span class="label">参赛者</span>
                    <span>张伟</span>
                </div>
                <div class="voucher-row">
                    <span class="label">活动日期</span>
                    <span>2026年7月15日-18日</span>
                </div>
                <div class="voucher-row">
                    <span class="label">报名费用</span>
                    <span style="color:#ff4d4f;font-weight:600;">¥1680</span>
                </div>
                <div class="voucher-row">
                    <span class="label">支付方式</span>
                    <span>微信支付</span>
                </div>

                <!-- 二维码占位 -->
                <div class="qr-placeholder">
                    <div style="font-size:32px;margin-bottom:4px;">📋</div>
                    <div>签到二维码</div>
                </div>
                <div style="text-align:center;font-size:12px;color:#999;margin-top:8px;">请出示此二维码进行签到核销</div>
            </div>

            <!-- 按钮 -->
            <div class="success-btns">
                <a href="my-activities.html" class="btn btn-outline">查看报名</a>
                <a href="index.html" class="btn btn-filled">返回首页</a>
            </div>

            <!-- 温馨提示 -->
            <div style="margin:16px;font-size:12px;color:#999;line-height:1.6;padding:12px;background:#f9f9f9;border-radius:8px;">
                <strong style="color:#666;">温馨提示：</strong><br>
                1. 报名成功后，请留意微信服务通知推送的赛事提醒<br>
                2. 赛事开始前3天，我们将发送详细装备清单和集合信息<br>
                3. 如需退赛或转让名额，请在赛事开始前7天联系客服
            </div>
        </div>
    </div>

    <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item">
            <div class="tab-icon">🏠</div>
            <span>首页</span>
        </a>
        <a href="offline.html" class="tab-item">
            <div class="tab-icon">📍</div>
            <span>线下</span>
        </a>
        <a href="charity.html" class="tab-item">
            <div class="tab-icon">❤️</div>
            <span>公益</span>
        </a>
        <a href="profile.html" class="tab-item active">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </a>
    </nav>

</html>
