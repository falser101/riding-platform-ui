<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>线下门店 - 骑行平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部 -->
        <div class="mp-header">
            <span style="font-size:14px;">线下门店</span>
        </div>

        <div class="page-content">
            <!-- 门店1 -->
            <div class="store-card" onclick="location.href='store-detail.html'">
                <div class="store-img">📍 高原骑行体验店（西宁旗舰店）</div>
                <div class="store-content">
                    <div class="store-name">高原骑行体验店（西宁旗舰店）</div>
                    <div class="store-addr">📍 青海省西宁市城中区长江路98号</div>
                    <div class="store-hours">🕐 营业时间：09:00 - 21:00</div>
                    <div class="store-btns">
                        <button class="btn-store">🗺️ 导航</button>
                        <button class="btn-store">📞 电话</button>
                    </div>
                </div>
            </div>

            <!-- 门店2 -->
            <div class="store-card" onclick="location.href='store-detail.html'">
                <div class="store-img" style="background:linear-gradient(135deg,#1a5f9e,#2d8bc9);">📍 环湖驿站</div>
                <div class="store-content">
                    <div class="store-name">环湖驿站（青海湖二郎剑店）</div>
                    <div class="store-addr">📍 青海湖二郎剑景区停车场南侧50米</div>
                    <div class="store-hours">🕐 营业时间：08:00 - 20:00</div>
                    <div class="store-btns">
                        <button class="btn-store">🗺️ 导航</button>
                        <button class="btn-store">📞 电话</button>
                    </div>
                </div>
            </div>

            <!-- 门店3 -->
            <div class="store-card" onclick="location.href='store-detail.html'">
                <div class="store-img" style="background:linear-gradient(135deg,#52c41a,#73d13d);">📍 格尔木补给站</div>
                <div class="store-content">
                    <div class="store-name">格尔木骑行补给站</div>
                    <div class="store-addr">📍 青海省格尔木市黄河东路58号</div>
                    <div class="store-hours">🕐 营业时间：07:00 - 22:00</div>
                    <div class="store-btns">
                        <button class="btn-store">🗺️ 导航</button>
                        <button class="btn-store">📞 电话</button>
                    </div>
                </div>
            </div>

            <!-- 门店4 -->
            <div class="store-card" onclick="location.href='store-detail.html'">
                <div class="store-img" style="background:linear-gradient(135deg,#8B4513,#a0522d);">📍 拉萨服务站</div>
                <div class="store-content">
                    <div class="store-name">拉萨骑行服务站（西藏总店）</div>
                    <div class="store-addr">📍 西藏拉萨市城关区北京中路120号</div>
                    <div class="store-hours">🕐 营业时间：09:00 - 21:00</div>
                    <div class="store-btns">
                        <button class="btn-store">🗺️ 导航</button>
                        <button class="btn-store">📞 电话</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item">
            <div class="tab-icon">🏠</div>
            <span>首页</span>
        </a>
        <a href="offline.html" class="tab-item active">
            <div class="tab-icon">📍</div>
            <span>线下</span>
        </a>
        <a href="charity.html" class="tab-item">
            <div class="tab-icon">❤️</div>
            <span>公益</span>
        </a>
        <a href="profile.html" class="tab-item">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </a>
    </nav>

</html>
