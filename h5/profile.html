<!DOCTYPE html>
<html lang="zh-CN">

            <div class="profile-menus">
                <div class="menu-item" onclick="location.href='my-activities.html'">

                    <div class="menu-label">我的报名</div>
                    <div style="font-size:12px;color:#999;margin-right:8px;">3个活动</div>
                    <span class="menu-arrow">›</span>

                <div class="menu-item" onclick="location.href='my-bikes.html'">

                    <div class="menu-label">我的订单</div>

                    <span class="menu-arrow">›</span>
                </div>
            </div>

            <!-- 其他 -->

                    <div class="menu-icon">📜</div>
                    <div class="menu-label">报名协议</div>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="location.href='#'">
                    <div class="menu-icon">ℹ️</div>
                    <div class="menu-label">关于我们</div>
                    <span class="menu-arrow">›</span>
                </div>
            </div>

            <!-- 退出登录 -->
            <div style="padding:16px;margin:12px;">
                <button style="width:100%;padding:12px;background:white;border:1px solid #ddd;border-radius:8px;font-size:15px;color:#666;">退出登录</button>
            </div>
        </div>
    </div>

            <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="offline.html" class="tab-item" id="tabActivity">
            <div class="tab-icon">📍</div>

        </a>
        <a href="bike.html" class="tab-item" id="tabBike">
            <div class="tab-icon">🚴</div>

        </a>
        <a href="profile.html" class="tab-item active" id="tabProfile">
