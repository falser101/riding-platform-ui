<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>骑行 - 骑行平台</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bike.css">
</head>
<body>
    <div class="app">
        <div class="mp-header">
            <span style="font-size:14px;">自行车</span>
        </div>

        <div class="page-content">
            <!-- 品牌网格 -->
            <div class="brand-grid">
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=trek'">
                    <div class="brand-card-img trek">TREK</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">TREK 崔克</div>
                        <div class="brand-card-desc">美国 · 公路/山地/砾石</div>
                        <div class="brand-card-count">共 6 个系列</div>
                    </div>
                </div>
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=giant'">
                    <div class="brand-card-img giant">GIANT</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">GIANT 捷安特</div>
                        <div class="brand-card-desc">中国台湾 · 公路/山地/城市</div>
                        <div class="brand-card-count">共 5 个系列</div>
                    </div>
                </div>
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=merida'">
                    <div class="brand-card-img merida">MERIDA</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">MERIDA 美利达</div>
                        <div class="brand-card-desc">中国台湾 · 公路/山地/旅行</div>
                        <div class="brand-card-count">共 4 个系列</div>
                    </div>
                </div>
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=specialized'">
                    <div class="brand-card-img specialized">S-WORKS</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">Specialized</div>
                        <div class="brand-card-desc">美国 · 公路/山地/通勤</div>
                        <div class="brand-card-count">共 6 个系列</div>
                    </div>
                </div>
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=canyon'">
                    <div class="brand-card-img canyon">CANYON</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">CANYON  Canyon</div>
                        <div class="brand-card-desc">德国 · 公路/山地/铁三</div>
                        <div class="brand-card-count">共 5 个系列</div>
                    </div>
                </div>
                <div class="brand-card" onclick="location.href='bike-brand.html?brand=bianchi'">
                    <div class="brand-card-img bianchi">BIANCHI</div>
                    <div class="brand-card-info">
                        <div class="brand-card-name">Bianchi  比安奇</div>
                        <div class="brand-card-desc">意大利 · 公路/城市</div>
                        <div class="brand-card-count">共 3 个系列</div>
                    </div>
                </div>
            </div>

            <!-- 我的自行车入口 -->
            <div style="padding: 8px 16px 4px;">
                <div class="brand-card" style="display:flex;align-items:center;gap:12px;padding:12px;" onclick="location.href='my-bikes.html'">
                    <div style="width:50px;height:50px;background:linear-gradient(135deg,#1a5f9e,#2d8bc9);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;">🚴</div>
                    <div style="flex:1;">
                        <div style="font-size:14px;font-weight:600;">我的自行车</div>
                        <div style="font-size:12px;color:#999;">已添加 0 / 2 辆</div>
                    </div>
                    <div style="font-size:14px;color:#999;">›</div>
                </div>
            </div>
        </div>
    </div>

        <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="offline.html" class="tab-item" id="tabActivity">
            <div class="tab-icon">📍</div>
            <span>活动</span>
        </a>
        <a href="bike.html" class="tab-item" id="tabBike" class="tab-item active">
            <div class="tab-icon">🚴</div>
            <span>骑行</span>
        </a>
        <a href="profile.html" class="tab-item" id="tabProfile">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </a>
    </nav>
</body>
</html>
