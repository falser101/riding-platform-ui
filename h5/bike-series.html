    // 获取数据
    const seriesData = (modelsData[brand] && modelsData[brand][seriesId]) || { models: [] };
    const years = seriesData.models.map(m => m.year).sort((a, b) => b - a); // 降序
    let currentYear = years[0] || 2025;

    function renderYearTabs() {
        const el = document.getElementById('yearTabs');
        el.innerHTML = years.map(y =>
            `<div class="year-tab${y === currentYear ? ' active' : ''}" data-year="${y}">${y}款</div>`
        ).join('');
        el.querySelectorAll('.year-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                currentYear = parseInt(this.dataset.year);
                renderYearTabs();
                renderModels();
            });
        });
    }

    function renderModels() {
        const el = document.getElementById('modelGrid');
        const yearData = seriesData.models.find(m => m.year === currentYear);
        if (!yearData || !yearData.items.length) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无该年份数据</div>';
            return;
        }
        el.innerHTML = yearData.items.map(m => `
            <div class="model-card" onclick="location.href='bike-detail.html?brand=${brand}&series=${seriesId}&model=${m.id}&year=${currentYear}'">
                <div class="model-card-img">
                    <span style="font-size:36px;">🚴</span>
                </div>
                <div class="model-card-body">
                    <div class="model-card-name">${m.name}</div>
                    <div class="model-card-year">${currentYear}款</div>
                    <div class="model-card-price">¥${m.price.toLocaleString()}</div>
                </div>
            </div>
        `).join('');
    }

    renderYearTabs();
    renderModels();
