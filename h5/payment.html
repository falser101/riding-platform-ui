<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>支付订单 - 骑行平台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100vh; }
        .app { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 0; }
        .page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 70px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部 -->
        <div class="mp-header">
            <span class="back-btn" onclick="history.back()">←</span>
            <span>确认支付</span>
        </div>

        <div class="page-content">
            <!-- 订单摘要 -->
            <div class="order-card">
                <div style="font-size:14px;color:#666;margin-bottom:8px;">订单信息</div>
                <div style="font-size:16px;font-weight:600;margin-bottom:8px;">2026 环青海湖国际骑行挑战赛</div>
                <div style="font-size:13px;color:#999;">报名费 × 1人 · 2026年7月15日-18日</div>
            </div>

            <!-- 金额 -->
            <div class="pay-amount">
                <div class="label">应付金额</div>
                <div class="amount">¥1680.00</div>
            </div>

            <!-- 支付方式 -->
            <div class="pay-methods">
                <div style="font-size:14px;color:#666;margin-bottom:10px;padding-left:4px;">选择支付方式</div>
                <div class="pay-method selected">
                    <div class="pay-icon">W</div>
                    <div class="pay-method-info">
                        <div class="pay-method-name">微信支付</div>
                        <div class="pay-method-desc">推荐</div>
                    </div>
                    <div class="pay-radio selected"></div>
                </div>
                <div class="pay-method">
                    <div style="width:40px;height:40px;background:#1677ff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;margin-right:12px;">支</div>
                    <div class="pay-method-info">
                        <div class="pay-method-name">支付宝</div>
                        <div class="pay-method-desc">暂不支持</div>
                    </div>
                    <div class="pay-radio"></div>
                </div>
            </div>

            <!-- 提示 -->
            <div style="padding:0 16px;font-size:12px;color:#999;line-height:1.6;">
                <p>💳 支付成功后，报名结果将发送至您的微信服务通知</p>
                <p>⏰ 请在 <strong style="color:#ff4d4f;">15分钟</strong> 内完成支付，逾期订单自动取消</p>
            </div>
        </div>

        <!-- 底部支付 -->
        <div class="bottom-bar">
            <a href="signup-success.html" class="btn-primary" style="flex:1;">确认支付 ¥1680.00</a>
        </div>
    </div>

            <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="offline.html" class="tab-item" id="tabActivity" class="tab-item active">
            <div class="tab-icon">📍</div>
            <span>活动</span>
        </a>
        <a href="bike.html" class="tab-item" id="tabBike">
            <div class="tab-icon">🚴</div>
            <span>骑行</span>
        </a>
        <a href="profile.html" class="tab-item" id="tabProfile">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </a>
    </nav>

    <script>
    document.querySelectorAll('.pay-method').forEach(el => {
        el.addEventListener('click', function() {
            document.querySelectorAll('.pay-method').forEach(m => {
                m.classList.remove('selected');
                m.querySelector('.pay-radio').classList.remove('selected');
            });
            this.classList.add('selected');
            this.querySelector('.pay-radio').classList.add('selected');
        });
    });
    </script>
</body>
</html>
