<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公益 - 骑行平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部 -->
        <div class="mp-header">
            <span style="font-size:14px;">公益骑行</span>
        </div>

        <div class="page-content">
            <!-- Banner -->
            <div class="charity-banner">
                <h2>❤️ 公益骑行</h2>
                <p>每一次骑行，都是爱的传递</p>
            </div>

            <!-- 活动入口 -->
            <div class="charity-entry">
                <div class="entry-card" onclick="location.href='charity-detail.html'">
                    <div class="entry-icon">👨‍👩‍👧</div>
                    <div class="entry-title">亲子骑行活动</div>
                    <div class="entry-desc">每周六/周日</div>
                </div>
                <div class="entry-card" onclick="location.href='charity-detail.html'">
                    <div class="entry-icon orange">🚴</div>
                    <div class="entry-title">周日公益骑行</div>
                    <div class="entry-desc">每周日早晨</div>
                </div>
            </div>

            <!-- 往期回顾 -->
            <div class="section-header" style="padding:16px 16px 8px;">
                <h2 style="font-size:16px;">🌟 往期活动回顾</h2>
            </div>

            <div class="past-activities">
                <div class="past-item">
                    <div class="past-thumb" style="background:linear-gradient(135deg,#ff4d4f,#ff8c00);"></div>
                    <div class="past-info">
                        <div class="past-title">"骑向未来"公益骑行活动</div>
                        <div class="past-desc">2026年3月15日 · 40组家庭参与 · 筹集善款 ¥12,800</div>
                    </div>
                </div>
                <div class="past-item">
                    <div class="past-thumb" style="background:linear-gradient(135deg,#1a5f9e,#2d8bc9);"></div>
                    <div class="past-info">
                        <div class="past-title">"为爱骑行"山区助学活动</div>
                        <div class="past-desc">2026年2月14日 · 68人参与 · 资助学生 15 名</div>
                    </div>
                </div>
                <div class="past-item">
                    <div class="past-thumb" style="background:linear-gradient(135deg,#8B4513,#a0522d);"></div>
                    <div class="past-info">
                        <div class="past-title">"绿色骑行"环保公益行</div>
                        <div class="past-desc">2026年1月5日 · 收集沿途垃圾 200+ 袋</div>
                    </div>
                </div>
                <div class="past-item">
                    <div class="past-thumb" style="background:linear-gradient(135deg,#52c41a,#73d13d);"></div>
                    <div class="past-info">
                        <div class="past-title">"暖冬骑行"关爱老人活动</div>
                        <div class="past-desc">2025年12月20日 · 慰问养老院 3 所</div>
                    </div>
                </div>
            </div>

            <!-- 公益合作伙伴 -->
            <div style="margin:12px 16px;">
                <div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#666;">🏛️ 公益合作伙伴</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <div style="background:white;padding:8px 12px;border-radius:20px;font-size:12px;color:#666;">西藏青少年发展基金会</div>
                    <div style="background:white;padding:8px 12px;border-radius:20px;font-size:12px;color:#666;">青海省慈善总会</div>
                    <div style="background:white;padding:8px 12px;border-radius:20px;font-size:12px;color:#666;">中国儿童少年基金会</div>
                </div>
            </div>
        </div>
    </div>

            <!-- 底部Tab -->
    <nav class="tab-bar">
        <a href="offline.html" class="tab-item" id="tabActivity" class="tab-item active">
            <div class="tab-icon">📍</div>
            <span>活动</span>
        </a>
        <a href="bike.html" class="tab-item" id="tabBike">
            <div class="tab-icon">🚴</div>
            <span>骑行</span>
        </a>
        <a href="profile.html" class="tab-item" id="tabProfile">
            <div class="tab-icon">👤</div>
            <span>我的</span>
        </a>
    </nav>
</body>
</html>
