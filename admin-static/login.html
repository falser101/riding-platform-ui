<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 骑行平台管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1a5f9e;
  --primary-light: #2d8bc9;
  --secondary: #8B4513;
  --accent: #f5a623;
  --bg: #f0f4f8;
  --text: #333;
  --text2: #666;
  --text3: #999;
  --success: #52c41a;
  --danger: #ff4d4f;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a5f9e 0%, #2d8bc9 40%, #3da0d9 70%, #1a5f9e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
/* 背景装饰 */
body::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
body::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139,69,19,0.1) 0%, transparent 70%);
  border-radius: 50%;
}
.login-card {
  background: white;
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}
.login-header {
  text-align: center;
  margin-bottom: 36px;
}
.login-logo {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(26,95,158,0.3);
}
.login-header h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
}
.login-header p {
  color: var(--text3);
  font-size: 14px;
}
.form-item {
  margin-bottom: 20px;
}
.form-item label {
  display: block;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 500;
}
.form-input-wrap {
  position: relative;
}
.form-input-wrap .input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 18px;
  width: 20px;
  text-align: center;
}
.form-input {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border: 2px solid #e8ecf0;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
  background: #fafbfc;
}
.form-input:focus {
  border-color: var(--primary);
  background: white;
  box-shadow: 0 0 0 3px rgba(26,95,158,0.1);
}
.form-input::placeholder {
  color: #c0c4cc;
}
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-size: 14px;
}
.remember-me {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  color: var(--text2);
}
.remember-me input {
  accent-color: var(--primary);
  width: 16px;
  height: 16px;
}
.forgot-link {
  color: var(--primary);
  text-decoration: none;
  font-size: 13px;
}
.forgot-link:hover {
  text-decoration: underline;
}
.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(26,95,158,0.3);
}
.login-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(26,95,158,0.4);
}
.login-btn:active {
  transform: translateY(0);
}
.login-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
}
.form-error {
  color: var(--danger);
  font-size: 12px;
  margin-top: 4px;
  display: none;
}
.form-error.show {
  display: block;
}
.captcha-row {
  display: flex;
  gap: 12px;
}
.captcha-row .form-input {
  flex: 1;
}
.captcha-img {
  width: 120px;
  height: 48px;
  background: linear-gradient(135deg, #e8ecf0, #f0f4f8);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 4px;
  cursor: pointer;
  user-select: none;
  border: 2px solid #e8ecf0;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-logo">🚴</div>
    <h1>骑行平台</h1>
    <p>管理后台</p>
  </div>

  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="form-item">
      <label>账号</label>
      <div class="form-input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" class="form-input" id="username" placeholder="请输入管理员账号" value="admin" autocomplete="username">
      </div>
      <div class="form-error" id="usernameError">请输入账号</div>
    </div>

    <div class="form-item">
      <label>密码</label>
      <div class="form-input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" value="admin123" autocomplete="current-password">
      </div>
      <div class="form-error" id="passwordError">请输入密码</div>
    </div>

    <div class="form-item">
      <label>验证码</label>
      <div class="captcha-row">
        <div class="form-input-wrap">
          <span class="input-icon">🛡️</span>
          <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" autocomplete="off">
        </div>
        <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()" title="点击刷新">R7K2</div>
      </div>
      <div class="form-error" id="captchaError">请输入验证码</div>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" checked> 记住密码
      </label>
      <a href="#" class="forgot-link">忘记密码？</a>
    </div>

    <button type="submit" class="login-btn">登 录</button>
  </form>

  <div class="login-footer">
    西藏骑闯第三极体育文化传播有限公司<br>
    © 2026 骑行平台 All Rights Reserved
  </div>
</div>

<script>
function refreshCaptcha() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('captchaImg').textContent = code;
}

function handleLogin(e) {
  e.preventDefault();
  let valid = true;
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const captcha = document.getElementById('captcha').value.trim();

  document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));

  if (!username) {
    document.getElementById('usernameError').classList.add('show');
    valid = false;
  }
  if (!password) {
    document.getElementById('passwordError').classList.add('show');
    valid = false;
  }
  if (!captcha) {
    document.getElementById('captchaError').classList.add('show');
    valid = false;
  }

  if (valid) {
    localStorage.setItem('admin_logged_in', 'true');
    localStorage.setItem('admin_user', username);
    window.location.href = 'index.html';
  }
  return false;
}

// 如果已登录，直接跳转
if (localStorage.getItem('admin_logged_in') === 'true') {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
