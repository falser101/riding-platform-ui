<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车辆管理 - 骑行平台管理后台</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="collapse-btn" id="collapseBtn">☰</button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="header-right">
        <button class="header-action" title="通知">🔔<span class="badge-dot"></span></button>
        <div class="user-menu">
          <div class="user-avatar">管</div>
          <span class="user-name">管理员</span>
          <span class="user-dropdown-icon">▾</span>
          <div class="user-dropdown">
            <div class="dropdown-item" onclick="location.href='settings.html'">⚙️ 系统设置</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" onclick="handleLogout()">🚪 退出登录</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content animate-in">
      <!-- 统计 -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;">
        <div class="stat-card blue"><div class="stat-icon blue">🏷️</div><div class="stat-info"><div class="stat-value">6</div><div class="stat-label">品牌总数</div></div></div>
        <div class="stat-card green"><div class="stat-icon green">📂</div><div class="stat-info"><div class="stat-value">29</div><div class="stat-label">系列总数</div></div></div>
        <div class="stat-card orange"><div class="stat-icon orange">🚴</div><div class="stat-info"><div class="stat-value">156</div><div class="stat-label">车型总数</div></div></div>
        <div class="stat-card red"><div class="stat-icon red">⭐</div><div class="stat-info"><div class="stat-value">2,847</div><div class="stat-label">用户收藏</div></div></div>
      </div>

      <!-- 车型列表视图 -->
      <div id="modelsView">
        <div class="filter-bar">
          <select class="form-select" id="filterBrand">
            <option value="">全部品牌</option>
            <option>TREK</option><option>GIANT</option><option>MERIDA</option>
            <option>Specialized</option><option>CANYON</option><option>Bianchi</option>
          </select>
          <select class="form-select" id="filterType">
            <option value="">全部类型</option>
            <option>公路车</option><option>山地车</option><option>砾石车</option>
          </select>
          <input class="form-input" placeholder="搜索车型名称..." id="filterKw">
          <button class="btn btn-primary btn-sm" onclick="filterModels()">筛选</button>
        </div>
        <div class="panel">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>品牌</th><th>系列</th><th>车型名称</th><th>年份</th><th>类型</th><th>价格</th><th>重量</th><th>材质</th><th style="width:100px;">操作</th></tr></thead>
              <tbody id="modelBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info">共 156 条</div>
            <div class="pagination-btns">
              <button class="page-btn" disabled>‹</button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn">...</button>
              <button class="page-btn">›</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
renderLayout('bikes', '车辆管理');

const models = [
  { brand:'TREK', series:'Domane', name:'Domane SL 5', year:2025, type:'公路车', price:22800, weight:'9.6kg', material:'碳纤维' },
  { brand:'TREK', series:'Madone', name:'Madone SLR 6', year:2025, type:'公路车', price:52800, weight:'7.8kg', material:'碳纤维' },
  { brand:'TREK', series:'Émonda', name:'Émonda SL 6', year:2024, type:'公路车', price:25800, weight:'8.2kg', material:'碳纤维' },
  { brand:'GIANT', series:'Defy', name:'Defy Advanced 2', year:2025, type:'公路车', price:14800, weight:'8.8kg', material:'碳纤维' },
  { brand:'GIANT', series:'Propel', name:'Propel Advanced SL', year:2025, type:'公路车', price:39800, weight:'7.2kg', material:'碳纤维' },
  { brand:'GIANT', series:'TCR', name:'TCR Advanced Pro 1', year:2024, type:'公路车', price:19800, weight:'7.5kg', material:'碳纤维' },
  { brand:'Specialized', series:'Roubaix', name:'Roubaix SL7 Comp', year:2025, type:'公路车', price:35800, weight:'8.4kg', material:'碳纤维' },
  { brand:'Specialized', series:'Tarmac', name:'Tarmac SL7 Pro', year:2025, type:'公路车', price:49800, weight:'7.0kg', material:'碳纤维' },
  { brand:'CANYON', series:'Endurace', name:'Endurace CF SL 8', year:2025, type:'公路车', price:26800, weight:'8.1kg', material:'碳纤维' },
  { brand:'MERIDA', series:'Scultura', name:'Scultura 6000', year:2024, type:'公路车', price:19800, weight:'7.9kg', material:'碳纤维' },
  { brand:'TREK', series:'Checkpoint', name:'Checkpoint SL 5', year:2025, type:'砾石车', price:24800, weight:'9.8kg', material:'碳纤维' },
  { brand:'GIANT', series:'Revolt', name:'Revolt Advanced 2', year:2025, type:'砾石车', price:15800, weight:'9.5kg', material:'碳纤维' },
];

// 车型列表视图
function renderModels(data) {
  document.getElementById('modelBody').innerHTML = data.map(m => `
    <tr>
      <td style="font-weight:500;">${m.brand}</td>
      <td>${m.series}</td>
      <td><strong>${m.name}</strong></td>
      <td>${m.year}</td>
      <td><span class="tag ${m.type==='公路车'?'tag-info':m.type==='砾石车'?'tag-warning':'tag-success'}">${m.type}</span></td>
      <td style="font-weight:600;">¥${m.price.toLocaleString()}</td>
      <td style="color:var(--el-text-color-secondary);">${m.weight}</td>
      <td style="color:var(--el-text-color-secondary);">${m.material}</td>
      <td>
        <button class="btn btn-text btn-sm" onclick="showToast('编辑车型','info')">编辑</button>
        <button class="btn btn-text btn-sm danger" onclick="showToast('已删除','success')">删除</button>
      </td>
    </tr>
  `).join('');
}

function filterModels() {
  const brand = document.getElementById('filterBrand').value;
  const type = document.getElementById('filterType').value;
  const kw = document.getElementById('filterKw').value.toLowerCase();
  const filtered = models.filter(m => {
    if (brand && m.brand !== brand) return false;
    if (type && m.type !== type) return false;
    if (kw && !m.name.toLowerCase().includes(kw)) return false;
    return true;
  });
  renderModels(filtered);
}

renderModels(models);
</script>
</body>
</html>
