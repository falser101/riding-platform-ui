<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车辆管理 - 骑行平台管理后台</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="collapse-btn" id="collapseBtn">☰</button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="header-right">
        <button class="header-action" title="通知">🔔<span class="badge-dot"></span></button>
        <div class="user-menu">
          <div class="user-avatar">管</div>
          <span class="user-name">管理员</span>
          <span class="user-dropdown-icon">▾</span>
          <div class="user-dropdown">
            <div class="dropdown-item" onclick="location.href='settings.html'">⚙️ 系统设置</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" onclick="handleLogout()">🚪 退出登录</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content animate-in">
      <div class="page-header">
        <div class="page-title"><span class="page-title-icon">🚴</span>车辆管理</div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openModal('brandModal')">➕ 添加品牌</button>
        </div>
      </div>

      <!-- 统计 -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;">
        <div class="stat-card blue"><div class="stat-icon blue">🏷️</div><div class="stat-info"><div class="stat-value">6</div><div class="stat-label">品牌总数</div></div></div>
        <div class="stat-card green"><div class="stat-icon green">📂</div><div class="stat-info"><div class="stat-value">29</div><div class="stat-label">系列总数</div></div></div>
        <div class="stat-card orange"><div class="stat-icon orange">🚴</div><div class="stat-info"><div class="stat-value">156</div><div class="stat-label">车型总数</div></div></div>
        <div class="stat-card red"><div class="stat-icon red">⭐</div><div class="stat-info"><div class="stat-value">2,847</div><div class="stat-label">用户收藏</div></div></div>
      </div>

      <!-- Tab 切换 -->
      <div style="display:flex;gap:8px;margin-bottom:20px;" id="viewTabs">
        <button class="btn btn-primary btn-sm" data-tab="brands" onclick="switchView('brands')">品牌视图</button>
        <button class="btn btn-default btn-sm" data-tab="models" onclick="switchView('models')">车型列表</button>
      </div>

      <!-- 品牌视图 -->
      <div id="brandsView">
        <div class="brand-grid" id="brandGrid"></div>
      </div>

      <!-- 车型列表视图 -->
      <div id="modelsView" style="display:none;">
        <div class="filter-bar">
          <select class="form-select" id="filterBrand">
            <option value="">全部品牌</option>
            <option>TREK</option><option>GIANT</option><option>MERIDA</option>
            <option>Specialized</option><option>CANYON</option><option>Bianchi</option>
          </select>
          <select class="form-select" id="filterType">
            <option value="">全部类型</option>
            <option>公路车</option><option>山地车</option><option>砾石车</option>
          </select>
          <input class="form-input" placeholder="搜索车型名称..." id="filterKw">
          <button class="btn btn-primary btn-sm" onclick="filterModels()">筛选</button>
        </div>
        <div class="panel">
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>品牌</th><th>系列</th><th>车型名称</th><th>年份</th><th>类型</th><th>价格</th><th>重量</th><th>材质</th><th style="width:100px;">操作</th></tr></thead>
              <tbody id="modelBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info">共 156 条</div>
            <div class="pagination-btns">
              <button class="page-btn" disabled>‹</button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn">...</button>
              <button class="page-btn">›</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 品牌弹窗 -->
<div class="modal-overlay" id="brandModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <div class="modal-title">添加品牌</div>
      <button class="modal-close" onclick="closeModal('brandModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="required">品牌名称 (中文)</label>
        <input class="form-input" placeholder="如: 崔克">
      </div>
      <div class="form-group">
        <label class="required">品牌名称 (英文)</label>
        <input class="form-input" placeholder="如: TREK">
      </div>
      <div class="form-group">
        <label>产地/国家</label>
        <input class="form-input" placeholder="如: 美国">
      </div>
      <div class="form-group">
        <label>品类范围</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 公路车</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 山地车</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 砾石车</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 城市通勤</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 旅行车</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('brandModal')">取消</button>
      <button class="btn btn-primary" onclick="closeModal('brandModal');showToast('品牌已添加','success')">确认添加</button>
    </div>
  </div>
</div>

<!-- 系列弹窗 -->
<div class="modal-overlay" id="seriesModal">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div class="modal-title" id="seriesModalTitle">系列管理</div>
      <button class="modal-close" onclick="closeModal('seriesModal')">✕</button>
    </div>
    <div class="modal-body" id="seriesModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('seriesModal')">关闭</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
renderLayout('bikes', '车辆管理');

const brands = [
  { slug:'trek', name:'崔克 TREK', origin:'美国', cats:['公路车','山地车','砾石车','城市通勤','旅行车','铁三'], series:['Domane','Madone','Émonda','Checkpoint','Fuel EX','Procaliber'], color:'#1a5f9e' },
  { slug:'giant', name:'捷安特 GIANT', origin:'中国台湾', cats:['公路车','山地车','砾石车','城市通勤','旅行车'], series:['Defy','Propel','TCR','Revolt','Trance'], color:'#2d8bc9' },
  { slug:'merida', name:'美利达 MERIDA', origin:'中国台湾', cats:['公路车','山地车','砾石车','城市通勤'], series:['Scultura','Reacto','Silex','Big.Seven'], color:'#8B4513' },
  { slug:'specialized', name:'闪电 Specialized', origin:'美国', cats:['公路车','山地车','砾石车','城市通勤','旅行车','铁三'], series:['Roubaix','Tarmac','Aethos','Diverge','Stumpjumper','Epic'], color:'#d4380d' },
  { slug:'canyon', name:'CANYON', origin:'德国', cats:['公路车','山地车','砾石车','城市通勤','旅行车'], series:['Endurace','Aeroad','Ultimate','Grail','Spectral'], color:'#52c41a' },
  { slug:'bianchi', name:'比安奇 Bianchi', origin:'意大利', cats:['公路车','山地车','城市通勤'], series:['Oltre','Sprint','Impulso'], color:'#3da0d9' },
];

const models = [
  { brand:'TREK', series:'Domane', name:'Domane SL 5', year:2025, type:'公路车', price:22800, weight:'9.6kg', material:'碳纤维' },
  { brand:'TREK', series:'Madone', name:'Madone SLR 6', year:2025, type:'公路车', price:52800, weight:'7.8kg', material:'碳纤维' },
  { brand:'TREK', series:'Émonda', name:'Émonda SL 6', year:2024, type:'公路车', price:25800, weight:'8.2kg', material:'碳纤维' },
  { brand:'GIANT', series:'Defy', name:'Defy Advanced 2', year:2025, type:'公路车', price:14800, weight:'8.8kg', material:'碳纤维' },
  { brand:'GIANT', series:'Propel', name:'Propel Advanced SL', year:2025, type:'公路车', price:39800, weight:'7.2kg', material:'碳纤维' },
  { brand:'GIANT', series:'TCR', name:'TCR Advanced Pro 1', year:2024, type:'公路车', price:19800, weight:'7.5kg', material:'碳纤维' },
  { brand:'Specialized', series:'Roubaix', name:'Roubaix SL7 Comp', year:2025, type:'公路车', price:35800, weight:'8.4kg', material:'碳纤维' },
  { brand:'Specialized', series:'Tarmac', name:'Tarmac SL7 Pro', year:2025, type:'公路车', price:49800, weight:'7.0kg', material:'碳纤维' },
  { brand:'CANYON', series:'Endurace', name:'Endurace CF SL 8', year:2025, type:'公路车', price:26800, weight:'8.1kg', material:'碳纤维' },
  { brand:'MERIDA', series:'Scultura', name:'Scultura 6000', year:2024, type:'公路车', price:19800, weight:'7.9kg', material:'碳纤维' },
  { brand:'TREK', series:'Checkpoint', name:'Checkpoint SL 5', year:2025, type:'砾石车', price:24800, weight:'9.8kg', material:'碳纤维' },
  { brand:'GIANT', series:'Revolt', name:'Revolt Advanced 2', year:2025, type:'砾石车', price:15800, weight:'9.5kg', material:'碳纤维' },
];

// 品牌视图
function renderBrands() {
  document.getElementById('brandGrid').innerHTML = brands.map(b => `
    <div class="brand-card" style="border-left-color:${b.color};">
      <div class="brand-card-header">
        <div class="brand-card-name">${b.name}</div>
        <div style="font-size:12px;color:var(--text3);">${b.origin}</div>
      </div>
      <div class="brand-card-count">${b.series.length} 个系列 · ${b.cats.join(' / ')}</div>
      <div class="brand-series-list">
        ${b.series.map(s => `<span class="brand-series-tag">${s}</span>`).join('')}
      </div>
      <div class="brand-card-actions">
        <button class="btn btn-text btn-sm" onclick="viewSeries('${b.slug}')">系列管理</button>
        <button class="btn btn-text btn-sm" onclick="showToast('编辑品牌','info')">编辑</button>
        <button class="btn btn-text btn-sm danger" onclick="showToast('品牌已删除','success')">删除</button>
      </div>
    </div>
  `).join('');
}

function viewSeries(slug) {
  const b = brands.find(x => x.slug === slug);
  if (!b) return;
  document.getElementById('seriesModalTitle').textContent = b.name + ' - 系列管理';
  document.getElementById('seriesModalBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${b.series.map((s,i) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--border-light);border-radius:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:18px;">📁</span>
            <div>
              <div style="font-weight:600;font-size:14px;">${s}</div>
              <div style="font-size:12px;color:var(--text3);">3-6 个车型</div>
            </div>
          </div>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-text btn-sm" onclick="showToast('查看${s}车型列表','info')">车型</button>
            <button class="btn btn-text btn-sm" onclick="showToast('编辑系列','info')">编辑</button>
          </div>
        </div>
      `).join('')}
      <button class="btn btn-default" style="margin-top:8px;" onclick="showToast('添加系列','info')">➕ 添加系列</button>
    </div>`;
  openModal('seriesModal');
}

// 车型列表视图
function renderModels(data) {
  document.getElementById('modelBody').innerHTML = data.map(m => `
    <tr>
      <td style="font-weight:500;">${m.brand}</td>
      <td>${m.series}</td>
      <td><strong>${m.name}</strong></td>
      <td>${m.year}</td>
      <td><span class="tag ${m.type==='公路车'?'tag-info':m.type==='砾石车'?'tag-warning':'tag-success'}">${m.type}</span></td>
      <td style="font-weight:600;">¥${m.price.toLocaleString()}</td>
      <td style="color:var(--text2);">${m.weight}</td>
      <td style="color:var(--text2);">${m.material}</td>
      <td>
        <button class="btn btn-text btn-sm" onclick="showToast('编辑车型','info')">编辑</button>
        <button class="btn btn-text btn-sm danger" onclick="showToast('已删除','success')">删除</button>
      </td>
    </tr>
  `).join('');
}

function switchView(view) {
  document.getElementById('brandsView').style.display = view==='brands' ? '' : 'none';
  document.getElementById('modelsView').style.display = view==='models' ? '' : 'none';
  document.querySelectorAll('#viewTabs .btn').forEach(b => {
    b.className = b.dataset.tab === view ? 'btn btn-primary btn-sm' : 'btn btn-default btn-sm';
  });
}

function filterModels() {
  const brand = document.getElementById('filterBrand').value;
  const type = document.getElementById('filterType').value;
  const kw = document.getElementById('filterKw').value.toLowerCase();
  const filtered = models.filter(m => {
    if (brand && m.brand !== brand) return false;
    if (type && m.type !== type) return false;
    if (kw && !m.name.toLowerCase().includes(kw)) return false;
    return true;
  });
  renderModels(filtered);
}

renderBrands();
renderModels(models);
</script>
</body>
</html>
