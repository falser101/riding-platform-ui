<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店管理 - 骑行平台管理后台</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="collapse-btn" id="collapseBtn">☰</button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="header-right">
        <button class="header-action" title="通知">🔔<span class="badge-dot"></span></button>
        <div class="user-menu">
          <div class="user-avatar">管</div>
          <span class="user-name">管理员</span>
          <span class="user-dropdown-icon">▾</span>
          <div class="user-dropdown">
            <div class="dropdown-item" onclick="location.href='settings.html'">⚙️ 系统设置</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" onclick="handleLogout()">🚪 退出登录</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content animate-in">
      <div class="page-header">
        <div class="page-title"><span class="page-title-icon">🏪</span>门店管理</div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openModal('storeModal')">➕ 添加门店</button>
        </div>
      </div>

      <!-- 统计 -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
        <div class="stat-card blue"><div class="stat-icon blue">🏪</div><div class="stat-info"><div class="stat-value">4</div><div class="stat-label">门店总数</div></div></div>
        <div class="stat-card green"><div class="stat-icon green">🔧</div><div class="stat-info"><div class="stat-value">12</div><div class="stat-label">服务项目</div></div></div>
        <div class="stat-card orange"><div class="stat-icon orange">🏷️</div><div class="stat-info"><div class="stat-value">8</div><div class="stat-label">进行中优惠</div></div></div>
      </div>

      <!-- 门店卡片 -->
      <div class="card-grid" id="storeGrid"></div>
    </div>
  </div>
</div>

<!-- 添加/编辑门店弹窗 -->
<div class="modal-overlay" id="storeModal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <div class="modal-title" id="storeModalTitle">添加门店</div>
      <button class="modal-close" onclick="closeModal('storeModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="required">门店名称</label>
          <input class="form-input" id="f_name" placeholder="请输入门店名称">
        </div>
        <div class="form-group">
          <label class="required">联系电话</label>
          <input class="form-input" id="f_phone" placeholder="如: 0971-8888888">
        </div>
      </div>
      <div class="form-group">
        <label class="required">门店地址</label>
        <input class="form-input" id="f_addr" placeholder="详细地址">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>营业时间</label>
          <input class="form-input" id="f_hours" placeholder="如: 09:00-21:00">
        </div>
        <div class="form-group">
          <label>图标 Emoji</label>
          <input class="form-input" id="f_emoji" placeholder="如: 🏪" style="width:100px;">
        </div>
      </div>
      <div class="form-group">
        <label>门店描述</label>
        <textarea id="f_desc" rows="2" placeholder="门店简介"></textarea>
      </div>
      <div class="form-group">
        <label>特色服务</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> Bike Fitting</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 车辆调试</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 装备租赁</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="checkbox"> 骑行培训</label>
        </div>
      </div>
      <div class="form-group">
        <label>优惠活动</label>
        <textarea id="f_promo" rows="2" placeholder="每行一条优惠信息"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('storeModal')">取消</button>
      <button class="btn btn-primary" onclick="saveStore()">确认保存</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
renderLayout('stores', '门店管理');

const stores = [
  { id:1, name:'拉萨旗舰体验店', emoji:'🏪', phone:'0891-6668888', addr:'拉萨市城关区北京中路88号', hours:'09:00-21:00', desc:'骑行平台旗舰店，提供全品牌试骑、Bike Fitting、装备选购等一站式服务', services:['Bike Fitting','车辆调试','装备租赁','骑行培训'], promos:['新会员首单9折','骑行装备租赁满减'], color:'linear-gradient(135deg,#1a5f9e,#2d8bc9)' },
  { id:2, name:'西宁中心店', emoji:'🏔️', phone:'0971-8886666', addr:'西宁市城西区五四大街52号', hours:'09:30-20:30', desc:'西宁核心门店，专注高原骑行装备与培训', services:['车辆调试','装备租赁','骑行培训'], promos:['高原装备套餐特惠'], color:'linear-gradient(135deg,#8B4513,#a0522d)' },
  { id:3, name:'成都天府大道店', emoji:'🌿', phone:'028-85551234', addr:'成都市武侯区天府大道北段168号', hours:'10:00-21:00', desc:'成都地区核心门店，提供专业Bike Fitting与骑行培训', services:['Bike Fitting','车辆调试','骑行培训'], promos:['Bike Fitting体验价¥299'], color:'linear-gradient(135deg,#52c41a,#73d13d)' },
  { id:4, name:'厦门环岛路店', emoji:'🌊', phone:'0592-5558888', addr:'厦门市思明区环岛南路168号', hours:'08:00-20:00', desc:'环岛路骑行起点门店，提供休闲骑行与海景路线服务', services:['装备租赁','骑行培训'], promos:['双人骑行装备8折','环岛路线免费导览'], color:'linear-gradient(135deg,#f5a623,#f7c948)' },
];

function renderStores() {
  document.getElementById('storeGrid').innerHTML = stores.map(s => `
    <div class="store-card">
      <div class="store-card-banner" style="background:${s.color};">
        <span style="font-size:40px;">${s.emoji}</span>
        ${s.promos.length ? `<div class="store-card-badge">${s.promos.length}个优惠</div>` : ''}
      </div>
      <div class="store-card-body">
        <div class="store-card-title">
          <h3>${s.name}</h3>
        </div>
        <div class="store-card-info">
          <div class="info-row">📞 ${s.phone}</div>
          <div class="info-row">📍 ${s.addr}</div>
          <div class="info-row">🕐 ${s.hours}</div>
          <div class="info-row">🔧 ${s.services.join(' · ')}</div>
        </div>
        <div class="store-card-actions">
          <button class="btn btn-text btn-sm" onclick="editStore(${s.id})">编辑</button>
          <button class="btn btn-text btn-sm" onclick="showToast('查看详情','info')">详情</button>
          <button class="btn btn-text btn-sm danger" onclick="deleteStore(${s.id})">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editStore(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  document.getElementById('storeModalTitle').textContent = '编辑门店';
  document.getElementById('f_name').value = s.name;
  document.getElementById('f_phone').value = s.phone;
  document.getElementById('f_addr').value = s.addr;
  document.getElementById('f_hours').value = s.hours;
  document.getElementById('f_emoji').value = s.emoji;
  document.getElementById('f_desc').value = s.desc;
  openModal('storeModal');
}
function deleteStore(id) { if(confirm('确认删除该门店？')) showToast('门店已删除','success'); }
function saveStore() { closeModal('storeModal'); showToast('门店已保存','success'); }

renderStores();
</script>
</body>
</html>
